# ==============================================================================
#  Arr Media Automation Stack
# ==============================================================================
#
#  A complete home media server: automatically search, download, organize,
#  and stream movies, TV shows, music, books, and audiobooks.
#
#  SETUP:
#    1. Copy .env.example to .env and fill in your values
#    2. Create the directory tree listed in .env.example
#    3. Run:  docker compose up -d
#
#  ARCHITECTURE:
#    Prowlarr manages indexers and syncs them to the *arr apps.
#    Radarr/Sonarr/Lidarr/LazyLibrarian search indexers and send downloads
#    to Transmission (torrents) or SABnzbd (usenet), which run inside a
#    VPN tunnel via Gluetun. Jellyfin streams the organized media.
#    Seerr lets users request new content through a friendly UI.
#
#  IMAGE TAGS:
#    Images are pinned to exact versions where possible to prevent surprise
#    breakage. To update, change the tag and run: docker compose pull && docker compose up -d
#    Images without semver tags (gluetun, lazylibrarian, kavita) use :latest.
#
# ==============================================================================

services:

  # ============================================================================
  #  VPN TUNNEL
  # ============================================================================
  #  Gluetun creates a WireGuard VPN tunnel. Download clients share its
  #  network (via network_mode) so all download traffic is routed through
  #  the VPN. Their web UIs are exposed through Gluetun's ports below.
  # ============================================================================

  gluetun:  # WireGuard VPN container — all downloads route through this
    image: qmcgaw/gluetun:latest  # no semver tags available
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      # --- Provider selection (set in .env) ---
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=wireguard
      # --- Shared: all WireGuard providers need the private key ---
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      # --- Named provider (e.g. protonvpn): server selection ---
      - SERVER_COUNTRIES=${SERVER_COUNTRIES:-}
      # --- Custom provider: raw WireGuard config ---
      - WIREGUARD_PUBLIC_KEY=${WIREGUARD_PUBLIC_KEY:-}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESS:-}
      - VPN_ENDPOINT_IP=${VPN_ENDPOINT_IP:-}
      - VPN_ENDPOINT_PORT=${VPN_ENDPOINT_PORT:-}
      # --- Features ---
      - VPN_PORT_FORWARDING=${VPN_PORT_FORWARDING:-off}
      - VPN_PORT_FORWARDING_LISTENING_PORT=${VPN_PORT_FORWARDING_LISTENING_PORT:-}
      # Auto-update Transmission's peer port when the forwarded port changes.
      # Gluetun replaces {{PORTS}} with the actual forwarded port number.
      - "VPN_PORT_FORWARDING_UP_COMMAND=/bin/sh -c 'SID=$$(wget --server-response -qO /dev/null http://localhost:9091/transmission/rpc 2>&1 | grep -i \"X-Transmission-Session-Id:\" | head -1 | sed \"s/.*X-Transmission-Session-Id: //i\" | tr -d \"\\r\\n \"); wget -qO- --header=\"X-Transmission-Session-Id: $$SID\" --post-data=\"{\\\"method\\\":\\\"session-set\\\",\\\"arguments\\\":{\\\"peer-port\\\":{{PORTS}}}}\" http://localhost:9091/transmission/rpc'"
      - WIREGUARD_PERSISTENT_KEEPALIVE_INTERVAL=${WIREGUARD_PERSISTENT_KEEPALIVE_INTERVAL:-}
      - FIREWALL_INPUT_PORTS=9091,8080
      - DOT=off
      - DNS_ADDRESS=1.1.1.1
      - TZ=${TZ}
    ports:
      - "9091:9091"    # Transmission web UI
      - "8080:8080"    # SABnzbd web UI
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:9999"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # ============================================================================
  #  DOWNLOAD CLIENTS
  # ============================================================================
  #  These run INSIDE the VPN tunnel (network_mode: service:gluetun).
  #  They have no ports of their own — access their UIs via Gluetun's
  #  mapped ports above (9091 for Transmission, 8080 for SABnzbd).
  # ============================================================================

  transmission:  # Torrent client — downloads torrents sent by the arr apps
    image: lscr.io/linuxserver/transmission:version-4.1.1-r1  # pinned 2026-03-14
    container_name: transmission
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DATA_ROOT}/config/transmission:/config
      # Mounted at /data for hardlink support — set download-dir to /data/downloads/torrents
      - ${DATA_ROOT}:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  sabnzbd:  # Usenet client — downloads NZBs sent by the arr apps
    image: lscr.io/linuxserver/sabnzbd:version-4.5.5  # pinned 2026-03-14
    container_name: sabnzbd
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DATA_ROOT}/config/sabnzbd:/config
      - ${DATA_ROOT}:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # ============================================================================
  #  INDEXER MANAGEMENT
  # ============================================================================

  prowlarr:  # Manages all your indexers, syncs them to the arr apps
    image: lscr.io/linuxserver/prowlarr:version-2.3.0.5236  # pinned 2026-03-14
    container_name: prowlarr
    # Hardcoded DNS bypasses any local DNS (Pi-hole, AdGuard, etc.)
    # Change to your preferred DNS servers if needed.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DATA_ROOT}/config/prowlarr:/config
    ports:
      - "9696:9696"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  flaresolverr:  # Bypasses Cloudflare protection on some indexer sites
    image: ghcr.io/flaresolverr/flaresolverr:v3.4.6  # pinned 2026-03-14
    container_name: flaresolverr
    init: true  # reaps zombie Chromium child processes
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    ports:
      - "8191:8191"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # ============================================================================
  #  MEDIA MANAGEMENT (The *Arr Apps)
  # ============================================================================
  #  These search indexers, send downloads to your clients, and organize
  #  the finished files into your media library with proper naming.
  # ============================================================================

  radarr:  # Movies — search, download, and organize your movie collection
    image: lscr.io/linuxserver/radarr:version-6.0.4.10291  # pinned 2026-03-14
    container_name: radarr
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DATA_ROOT}/config/radarr:/config
      - ${DATA_ROOT}:/data
    ports:
      - "7878:7878"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  sonarr:  # TV Shows — search, download, and organize TV series
    image: lscr.io/linuxserver/sonarr:version-4.0.16.2944  # pinned 2026-03-14
    container_name: sonarr
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DATA_ROOT}/config/sonarr:/config
      - ${DATA_ROOT}:/data
    ports:
      - "8989:8989"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  lidarr:  # Music — search, download, and organize your music library
    image: lscr.io/linuxserver/lidarr:version-3.1.0.4875  # pinned 2026-03-14
    container_name: lidarr
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DATA_ROOT}/config/lidarr:/config
      - ${DATA_ROOT}:/data
    ports:
      - "8686:8686"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  bazarr:  # Subtitles — automatically finds and downloads subtitles for Radarr/Sonarr
    image: lscr.io/linuxserver/bazarr:version-v1.5.6  # pinned 2026-03-14
    container_name: bazarr
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DATA_ROOT}/config/bazarr:/config
      - ${DATA_ROOT}:/data
    ports:
      - "6767:6767"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # ============================================================================
  #  BOOKS & AUDIOBOOKS
  # ============================================================================

  lazylibrarian:  # Book search & download management (like Radarr but for books)
    profiles: ["lazylibrarian", "kavita", "audiobookshelf"]
    image: lscr.io/linuxserver/lazylibrarian:latest  # no semver tags (uses git hashes)
    container_name: lazylibrarian
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - DOCKER_MODS=linuxserver/mods:universal-calibre|linuxserver/mods:lazylibrarian-ffmpeg
    volumes:
      - ${DATA_ROOT}/config/lazylibrarian:/config
      - ${DATA_ROOT}:/data
    ports:
      - "5299:5299"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  kavita:  # Ebook reader — read your books in the browser (self-hosted Kindle)
    profiles: ["kavita"]
    image: jvmilazz0/kavita:latest  # no rolling version tags available
    container_name: kavita
    environment:
      - TZ=${TZ}
    volumes:
      - ${DATA_ROOT}/config/kavita:/kavita/config
      - ${DATA_ROOT}/media/books:/books:ro
    ports:
      - "5004:5000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  audiobookshelf:  # Audiobook & podcast server with progress tracking
    profiles: ["audiobookshelf"]
    image: ghcr.io/advplyr/audiobookshelf:2.33.0  # pinned 2026-03-14
    container_name: audiobookshelf
    environment:
      - TZ=${TZ}
    volumes:
      - ${DATA_ROOT}/config/audiobookshelf:/config
      - ${DATA_ROOT}/config/audiobookshelf-meta:/metadata
      - ${DATA_ROOT}/media/audiobooks:/audiobooks:ro
    ports:
      - "13378:80"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # ============================================================================
  #  MEDIA SERVER & REQUESTS
  # ============================================================================

  jellyfin:  # Stream your media to any device (self-hosted Netflix)
    image: jellyfin/jellyfin:10.11  # rolling minor version tag
    container_name: jellyfin
    network_mode: host
    environment:
      - TZ=${TZ}
    volumes:
      - ${DATA_ROOT}/config/jellyfin:/config
      - ${DATA_ROOT}/config/jellyfin-cache:/cache
      - ${DATA_ROOT}/media/movies:/movies:ro
      - ${DATA_ROOT}/media/tv:/tv:ro
      - ${DATA_ROOT}/media/music:/music:ro
    # GPU hardware transcoding (Intel QSV, NVIDIA, etc.)
    # Configured per-deployment in compose.override.yaml — run: arr setup
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  seerr:  # Let users request movies & shows (integrates with Radarr + Sonarr)
    image: fallenbagel/jellyseerr:2.3.0  # pinned 2026-03-14
    container_name: seerr
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    volumes:
      - ${DATA_ROOT}/config/seerr:/app/config
    ports:
      - "5055:5055"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # ============================================================================
  #  GAMING
  # ============================================================================

  questarr:  # Game library management and tracking
    image: ghcr.io/doezer/questarr:v1.2.2  # pinned 2026-03-14
    container_name: questarr
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - SQLITE_DB_PATH=/app/data/sqlite.db
    volumes:
      - ${DATA_ROOT}/config/questarr:/app/data
    ports:
      - "5002:5000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
