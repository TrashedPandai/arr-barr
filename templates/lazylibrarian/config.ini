[GENERAL]
show_tor_prov = False
show_rss_prov = False
show_irc_prov = False
show_direct_prov = False
homepage = Authors
match_ratio = 60
dload_ratio = 70
displaylength = -1
config_tab_num = 3
imp_preflang = en, eng, en-US, English, en-GB, Unknown
date_lang = en_GB.UTF-8
ebook_dir = /data/media/books
audio_dir = /data/media/audiobooks
download_dir = /data/downloads/torrents/books, /data/downloads/usenet/books

[API]
api_enabled = True
api_key =
book_api = GoodReads

[LOGGING]
logdir = /config/log
loglevel = 10

[CALIBRE]
imp_calibredb = /usr/bin/calibredb

[TELEMETRY]
server_id =
telemetry_server = https://lazylibrarian.telem.ch
telemetry_enable = True

[GIT]
git_updated =
install_type = source DOCKER
current_version =
latest_version =

[SABNZBD]
sab_host = http://gluetun
sab_port = 8080
sab_api =
sab_cat = books

[USENET]
nzb_downloader_sabnzbd = True

[TORRENT]
tor_downloader_transmission = True

[TRANSMISSION]
transmission_host = gluetun
transmission_port = 9091
transmission_dir = /data/downloads/torrents/books

[LIBRARYSCAN]
newseries_status = Skipped

[POSTPROCESS]
audiobook_dest_folder = $Author/$Title

[PROWL]
prowl_priority = -2

# Indexers are configured through Prowlarr — add your Prowlarr indexers
# in LazyLibrarian's web UI after setup. Use http://prowlarr:9696 as the host.
